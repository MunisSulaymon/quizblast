<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - QuizBlast 🎮</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <!-- Loading state -->
  <div id="loading-state" class="auth-card" 
    style="text-align:center;">
    <div style="font-size:3rem;">⏳</div>
    <p class="auth-subtitle">Validating your link...</p>
  </div>

  <!-- Reset form -->
  <div id="reset-form-card" class="auth-card hidden">
    <h1 class="auth-logo" style="font-size:1.6rem;
      text-align:center;">
      🔐 Reset Password
    </h1>
    <p class="auth-subtitle" style="text-align:center;">
      Enter your new password below.
    </p>

    <div id="error-msg" class="error-msg hidden"></div>

    <div class="input-group">
      <span class="input-icon">🔒</span>
      <input type="password" id="password"
        placeholder="New password (min 6 chars)"
        oninput="checkStrength(this.value)"
        required>
      <button type="button"
        onclick="togglePassword('password')"
        class="show-pass-btn">👁️</button>
    </div>

    <div class="strength-container">
      <div class="strength-bar">
        <div id="strength-fill" 
          class="strength-fill"></div>
      </div>
      <span id="strength-text" 
        class="strength-text"></span>
    </div>

    <div class="input-group">
      <span class="input-icon">🔒</span>
      <input type="password" id="confirm-password"
        placeholder="Confirm new password" required>
    </div>

    <div id="confirm-hint" class="input-hint"></div>

    <button onclick="handleResetPassword()"
      id="reset-btn" class="btn-auth">
      Update Password
    </button>
  </div>

  <!-- Error state -->
  <div id="error-state" class="auth-card hidden"
    style="text-align:center;">
    <div style="font-size:4rem;margin-bottom:1rem;">
      ❌
    </div>
    <h1 class="auth-logo" style="font-size:1.4rem;">
      Link Invalid or Expired
    </h1>
    <p class="auth-subtitle">
      This reset link is no longer valid.
    </p>
    <a href="forgot-password.html" class="btn-auth"
      style="text-decoration:none;display:block;
      margin-top:1rem;text-align:center;">
      Request New Link
    </a>
    <a href="login.html"
      style="display:block;margin-top:1rem;
      color:rgba(255,255,255,0.6);
      text-decoration:none;font-size:0.9rem;">
      ← Back to Login
    </a>
  </div>

  <script src="auth.js"></script>
  <script>
    window.onload = validateResetToken;
    document.getElementById('confirm-password')
      .addEventListener('input', function() {
        const pass = document.getElementById('password').value;
        const hint = document.getElementById('confirm-hint');
        if (this.value.length === 0) {
          hint.textContent = '';
        } else if (this.value !== pass) {
          hint.textContent = '❌ Passwords do not match';
          hint.style.color = '#FF3355';
        } else {
          hint.textContent = '✅ Passwords match!';
          hint.style.color = '#26890C';
        }
      });
  </script>
</body>
</html>
