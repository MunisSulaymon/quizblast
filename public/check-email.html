<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Your Email - QuizBlast 🎮</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="auth-card" style="text-align:center;">
    <div class="email-bounce">📧</div>
    <h1 class="auth-logo" style="font-size:1.6rem;">
      Check Your Email!
    </h1>
    <p class="auth-subtitle">
      We sent a verification link to<br>
      <strong id="display-email" style="color:white;">
        your email
      </strong>
    </p>
    <p style="color:rgba(255,255,255,0.6);font-size:0.9rem;margin-bottom:1.5rem;">
      Click the link in the email to verify 
      your account. Check your spam folder 
      if you don't see it!
    </p>

    <button id="resend-btn" onclick="handleResendVerification()" 
      class="btn-auth" style="margin-bottom:0.5rem;">
      📨 Resend Email
    </button>

    <div id="cooldown-timer" class="hidden" 
      style="color:#D89E00;font-size:0.9rem;
      font-weight:600;margin-bottom:1rem;">
      Please wait <span id="seconds">60</span>s 
      before resending
    </div>

    <div id="resend-success" class="hidden"
      style="color:#26890C;font-size:0.9rem;
      font-weight:600;margin-bottom:1rem;">
      ✅ New verification email sent!
    </div>

    <a href="login.html" 
      style="color:rgba(255,255,255,0.6);
      font-size:0.9rem;text-decoration:none;">
      ← Wrong email? Go back to login
    </a>
  </div>
  <script src="auth.js"></script>
  <script>
    const email = sessionStorage.getItem('verifyEmail');
    if (email) {
      document.getElementById('display-email')
        .textContent = email;
    }
  </script>
</body>
</html>
