<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Mobile viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

    <!-- PWA / Mobile app feel -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- SEO -->
    <meta name="description" content="QuizBlast - Free real-time multiplayer quiz game. Create and play Kahoot-style quizzes with friends!">
    <meta name="keywords" content="quiz game, kahoot, multiplayer quiz, free quiz, classroom game">

    <!-- Open Graph (looks good when shared on WhatsApp etc) -->
    <meta property="og:title" content="QuizBlast 🎮">
    <meta property="og:description" content="Free real-time multiplayer quiz game!">
    <meta property="og:type" content="website">

    <title>QuizBlast 🎮 | The Ultimate Real-Time Quiz Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="shapes">
        <div class="shape" style="width: 100px; height: 100px; left: 10%; animation-duration: 15s;"></div>
        <div class="shape" style="width: 150px; height: 150px; left: 30%; animation-duration: 25s; border-radius: 50%;"></div>
        <div class="shape" style="width: 80px; height: 80px; left: 70%; animation-duration: 20s; transform: rotate(45deg);"></div>
        <div class="shape" style="width: 120px; height: 120px; left: 85%; animation-duration: 18s;"></div>
    </div>

    <main class="screen active">
        <div class="home-container">
            <h1 class="big-title">QuizBlast 🎮</h1>
            <p class="subtitle">The ultimate real-time quiz game!</p>
            
            <div class="home-buttons">
                <a href="host.html" style="text-decoration: none;">
                    <button class="btn-host">🎯 Host a Game</button>
                </a>
                <a href="join.html" style="text-decoration: none;">
                    <button class="btn-join">🎮 Join a Game</button>
                </a>
            </div>
        </div>
    </main>

    <footer style="position: fixed; bottom: 1rem; width: 100%; text-align: center; opacity: 0.6;">
        Built with ❤️ using Socket.io
    </footer>
</body>
</html>
