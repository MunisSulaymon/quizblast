<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - QuizBlast 🎮</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="auth-card">
    <h1 class="auth-logo" style="font-size:1.6rem;
      text-align:center;">
      🔑 Forgot Password?
    </h1>
    <p class="auth-subtitle" style="text-align:center;">
      Enter your email and we'll send you 
      a link to reset your password.
    </p>

    <div id="error-msg" class="error-msg hidden"></div>
    <div id="success-msg" class="success-msg hidden"></div>

    <div class="input-group">
      <span class="input-icon">📧</span>
      <input type="email" id="email"
        placeholder="Your email address" required>
    </div>

    <button onclick="handleForgotPassword()"
      id="forgot-btn" class="btn-auth">
      Send Reset Link
    </button>

    <p class="auth-footer">
      Remember your password? 
      <a href="login.html">Login here</a>
    </p>
  </div>
  <script src="auth.js"></script>
</body>
</html>
