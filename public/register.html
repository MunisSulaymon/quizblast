<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - QuizBlast 🎮</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon-custom.png">
  <link rel="apple-touch-icon" href="favicon-custom.png">
</head>
<body class="auth-page">
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="auth-card">
    <h1 class="auth-logo">QuizBlast 🎮</h1>
    <p class="auth-subtitle">Create your host account</p>
    
    <div id="error-msg" class="error-msg hidden"></div>
    <div id="success-msg" class="success-msg hidden"></div>
    
    <div class="input-group">
      <span class="input-icon">👤</span>
      <input type="text" id="username" 
        placeholder="Username (min 3 chars)" 
        maxlength="20" required>
      <div id="username-hint" class="input-hint"></div>
    </div>
    
    <div class="input-group">
      <span class="input-icon">📧</span>
      <input type="email" id="email" 
        placeholder="Email address" required>
      <div id="email-hint" class="input-hint"></div>
    </div>
    
    <div class="input-group">
      <span class="input-icon">🔒</span>
      <input type="password" id="password" 
        placeholder="Password (min 6 chars)"
        oninput="checkStrength(this.value)"
        required>
      <button type="button" 
        onclick="togglePassword('password')" 
        class="show-pass-btn">👁️</button>
    </div>
    
    <div class="strength-container">
      <div class="strength-bar">
        <div id="strength-fill" class="strength-fill"></div>
      </div>
      <span id="strength-text" class="strength-text"></span>
    </div>
    
    <div class="input-group">
      <span class="input-icon">🔒</span>
      <input type="password" id="confirm-password" 
        placeholder="Confirm password" required>
      <div id="confirm-hint" class="input-hint"></div>
    </div>
    
    <button onclick="handleRegister()" 
      id="register-btn" class="btn-auth">
      CREATE ACCOUNT
    </button>
    
    <p class="auth-footer">
      Already have an account? 
      <a href="login.html">Login here</a>
    </p>
  </div>
  <script>
  // Live username validation
  document.getElementById('username').addEventListener('input', function() {
    const val = this.value.trim();
    const hint = document.getElementById('username-hint');
    if (val.length === 0) {
      hint.textContent = '';
      this.style.borderColor = '';
    } else if (val.length < 3) {
      hint.textContent = '❌ Too short (min 3 chars)';
      hint.style.color = '#FF3355';
      this.style.borderColor = '#FF3355';
    } else if (!/^[a-zA-Z0-9_]+$/.test(val)) {
      hint.textContent = '❌ Only letters, numbers, underscores';
      hint.style.color = '#FF3355';
      this.style.borderColor = '#FF3355';
    } else {
      hint.textContent = '✅ Username looks good!';
      hint.style.color = '#26890C';
      this.style.borderColor = '#26890C';
    }
  });

  // Live email validation
  document.getElementById('email').addEventListener('input', function() {
    const val = this.value.trim();
    const hint = document.getElementById('email-hint');
    const valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val);
    if (val.length === 0) {
      hint.textContent = '';
      this.style.borderColor = '';
    } else if (!valid) {
      hint.textContent = '❌ Enter a valid email (e.g. name@email.com)';
      hint.style.color = '#FF3355';
      this.style.borderColor = '#FF3355';
    } else {
      hint.textContent = '✅ Email looks good!';
      hint.style.color = '#26890C';
      this.style.borderColor = '#26890C';
    }
  });

  // Live password match validation
  document.getElementById('confirm-password').addEventListener('input', function() {
    const pass = document.getElementById('password').value;
    const hint = document.getElementById('confirm-hint');
    if (this.value.length === 0) {
      hint.textContent = '';
      this.style.borderColor = '';
    } else if (this.value !== pass) {
      hint.textContent = '❌ Passwords do not match';
      hint.style.color = '#FF3355';
      this.style.borderColor = '#FF3355';
    } else {
      hint.textContent = '✅ Passwords match!';
      hint.style.color = '#26890C';
      this.style.borderColor = '#26890C';
    }
  });
  </script>
  <script src="auth.js"></script>
</body>
</html>
