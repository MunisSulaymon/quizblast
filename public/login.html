<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - QuizBlast 🎮</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="auth-card">
    <h1 class="auth-logo">QuizBlast 🎮</h1>
    <p class="auth-subtitle">Welcome back, Host!</p>
    
    <div id="error-msg" class="error-msg hidden"></div>
    
    <div class="input-group">
      <span class="input-icon">📧</span>
      <input type="email" id="email" 
        placeholder="Email address" required>
    </div>
    
    <div class="input-group">
      <span class="input-icon">🔒</span>
      <input type="password" id="password" 
        placeholder="Password" required>
      <button type="button" 
        onclick="togglePassword('password')" 
        class="show-pass-btn">👁️</button>
    </div>

    <div style="display:flex;justify-content:
      space-between;margin:-8px 0 12px;
      font-size:0.85rem;">
      <a href="forgot-password.html"
        style="color:rgba(255,255,255,0.7);
        text-decoration:none;">
        Forgot Password?
      </a>
      <a href="verify-error.html"
        style="color:rgba(255,255,255,0.5);
        text-decoration:none;">
        Resend verification
      </a>
    </div>

    <div id="verification-notice" class="hidden"
      style="background:rgba(70,23,143,0.3);
      border:1px solid #46178F;border-radius:12px;
      padding:12px;margin-bottom:1rem;
      font-size:0.9rem;color:white;
      text-align:center;">
      ⚠️ Please verify your email first.
      <br>
      <button onclick="resendFromLogin()"
        style="background:none;border:none;
        color:#FFD700;cursor:pointer;
        font-weight:700;font-size:0.9rem;
        margin-top:6px;text-decoration:underline;">
        Resend verification email
      </button>
    </div>
    
    <button onclick="handleLogin()" 
      id="login-btn" class="btn-auth">
      LOGIN
    </button>
    
    <div class="auth-divider">
      <span>or</span>
    </div>
    
    <button onclick="guestMode()" class="btn-guest">
      🎮 Continue as Guest
    </button>
    
    <p class="auth-footer">
      Don't have an account? 
      <a href="register.html">Register here</a>
    </p>
  </div>
  <script src="auth.js"></script>
</body>
</html>
