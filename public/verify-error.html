<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Expired - QuizBlast 🎮</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon-custom.png">
  <link rel="apple-touch-icon" href="favicon-custom.png">
</head>
<body class="auth-page">
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="auth-card" style="text-align:center;">
    <div style="font-size:4rem;margin-bottom:1rem;">⏰</div>
    <h1 class="auth-logo" style="font-size:1.5rem;">
      Link Expired or Invalid
    </h1>
    <p class="auth-subtitle">
      This verification link is no longer valid.
      Request a new one below.
    </p>

    <div id="error-msg" class="error-msg hidden"></div>
    <div id="success-msg" class="success-msg hidden"></div>

    <div class="input-group">
      <span class="input-icon">📧</span>
      <input type="email" id="resend-email"
        placeholder="Enter your email address">
    </div>

    <button onclick="resendFromErrorPage()"
      id="resend-btn" class="btn-auth">
      📨 Send New Verification Link
    </button>

    <a href="login.html"
      style="display:block;margin-top:1rem;
      color:rgba(255,255,255,0.6);
      text-decoration:none;font-size:0.9rem;">
      ← Back to Login
    </a>
  </div>
  <script src="auth.js"></script>
  <script>
    async function resendFromErrorPage() {
      const email = document.getElementById('resend-email').value.trim();
      const errDiv = document.getElementById('error-msg');
      const successDiv = document.getElementById('success-msg');
      const btn = document.getElementById('resend-btn');

      if (!email) {
        errDiv.textContent = 'Please enter your email';
        errDiv.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/auth/resend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        successDiv.textContent = 
          'If your account exists, a new link was sent!';
        successDiv.classList.remove('hidden');
        errDiv.classList.add('hidden');
      } catch (e) {
        errDiv.textContent = 'Failed to send. Try again.';
        errDiv.classList.remove('hidden');
      }

      btn.disabled = false;
      btn.textContent = '📨 Send New Verification Link';
    }
  </script>
</body>
</html>
